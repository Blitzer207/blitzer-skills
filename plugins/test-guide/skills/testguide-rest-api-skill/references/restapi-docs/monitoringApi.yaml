openapi: 3.0.2
info:
  title: test.guide Monitoring API
  description: API for accessing monitoring data of test.guide.
  contact:
    name: tracetronic support
    email: support@tracetronic.com
  license:
    name: tracetronic license
    url: https://www.tracetronic.com/software-license-terms/
  version: 2.6.0
servers:
  - url: /api/v2
    description: this test.guide server
  - url: /{context-path}/api/v2
    description: this test.guide server with a custom context path
    variables:
      context-path:
        default: test-guide
        description: context path to be used
  - url: '{url}/api/v2'
    description: custom test.guide server
    variables:
      url:
        default: https://localhost:8443
security:
  - TestGuideAuthKey: [ ]
  - BearerAuth: [ ]
paths:
  /monitoring/hilactivities:
    post:
      deprecated: true
      tags:
        - monitoring
      summary: | 
        Deprecated endpoint to start a filtering task for monitoring data about the HIL activity in the filter range.
        Deletion is planned for the near future. Use the POST /activitydistribution/export from Test Infrastructure API 
        to start the export of the test resource activity distribution.
      operationId: filter-monitoring-activities
      requestBody:
        description: Whitelist for the testbenches the activity should be calculated for.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MonitoringActivitiesFilter'
      responses:
        '202':
          description: The filtering of the report was started.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/TaskRef'
        '400':
          description: The testbench filters given are invalid.
        '401':
          description: The user is unauthorized for the project or the project doesn't exist.
        '404':
          description: Filter parameters are invalid.
        '409':
          description: There is no monitoring database configured.

  /monitoring/hilactivities/{taskId}/status:
    get:
      deprecated: true
      tags:
        - monitoring
      summary: |
        Deprecated endpoint to retrieve progress information about a given task. Deletion is planned for the near 
        future. Use the GET /activitydistribution/export/{taskId}/status from Test Infrastructure API to retrieve 
        progress information about the given export task.
      operationId: retrieve-activity-filter-status
      parameters:
        - $ref: '#/components/parameters/taskId'
      responses:
        '200':
          description: Report generation state was successfully retrieved.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/TaskProgress'
        '404':
          description: No task found with the given ID.
        '409':
          description: There is no monitoring database configured.

  /monitoring/hilactivities/{taskId}:
    get:
      deprecated: true
      tags:
        - monitoring
      summary: |
        Deprecated endpoint to retrieve monitoring data about the HIL activity in the filter range. Deletion is planned
        for the near future. Use the GET /activitydistribution/export/{taskId}/download from Test Infrastructure API 
        to retrieve the export result of the activity distribution.
      operationId: retrieve-monitoring-activity
      parameters:
        - $ref: '#/components/parameters/taskId'
      responses:
        '200':
          description: HIL activity data was successfully retrieved.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/HilActivities'
              example:
                - location: 'Headquarter/Level 1/Room 1.09'
                  testbench: 'HiL_Multimedia'
                  activityDistribution:
                    offline:
                      percentage: 0.5
                      period: 54000000
                    inactive:
                      percentage: 0.1
                      period: 10800000
                    userActivity:
                      percentage: 0.2
                      period: 21600000
                    automatedTestExecution:
                      percentage: 0.2
                      period: 21600000
                - location: 'Headquarter/Level 1/Room 1.09'
                  testbench: 'HiL_Powertrain'
                  activityDistribution:
                    offline:
                      percentage: 0
                      period: 0
                    inactive:
                      percentage: 0.1
                      period: 10800000
                    userActivity:
                      percentage: 0.2
                      period: 21600000
                    automatedTestExecution:
                      percentage: 0.7
                      period: 75600000
        '400':
          description: Task not done yet.
        '404':
          description: No task found with the given ID.
        '409':
          description: There is no monitoring database configured.
        '500':
          description: Unable to provide HIL activity data.

  /monitoring/healthstates:
    get:
      deprecated: true
      tags:
        - monitoring
      summary: | 
        Deprecetaed endpoint to retrieve chunked monitoring data about the health state of the requested test bench. 
        Deletion is planned for the near future. To obtain the most recent component states see the the componentStates 
        property at GET /testresourcemachines/{testResourceMachineId}/data from Test Infrastructure API.
      operationId: retrieve-monitoring-health-state
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/testbench'
        - $ref: '#/components/parameters/machine'
        - $ref: '#/components/parameters/healthStateOrder'
        - $ref: '#/components/parameters/offset'
        - name: limit
          in: query
          description: The maximum number of items to return.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 25
      responses:
        '200':
          description: Health state data was successfully retrieved.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/TestBenchHealthStates'
              example:
                - timestamp: '1993-01-13T16:30:00+01:00'
                  module: 'module'
                  component: 'component'
                  information: 'info'
                  state: 'OK'
                  errorLevel: 0
                  attributes: [ ]
                - timestamp: '1993-01-13T17:30:00+01:00'
                  module: 'module'
                  component: 'component'
                  information: 'error message'
                  state: 'MANUAL_ACTION_NECESSARY'
                  errorLevel: 1
                  attributes: [ ]
        '204':
          description: No monitoring data exist for the parameters supplied.
        '400':
          description: The input parameters are not valid.
        '401':
          description: The user is unauthorized for the project or the project doesn't exist.
        '404':
          description: Path identifier is unknown.
        '409':
          description: There is no monitoring database configured.

  /monitoring/heartbeat:
    get:
      deprecated: true
      tags:
        - monitoring
      summary: Deprecated endpoint to retrieve monitoring data about the most recent heartbeat. Use GET /testresourcemachines/{testResourceMachineId}/data from Test Infrastructure API instead and check the connectionState property.
      description: The online status might become outdated before the next expected heartbeat is received.
      operationId: retrieve-monitoring-heartbeat
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/testbench'
        - $ref: '#/components/parameters/machine'
      responses:
        '200':
          description: Recent heartbeat data was successfully retrieved.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Heartbeat'
              example:
                online: true
                nextExpected: '2019-07-31T00:01:00+02:00'
                timestamp: '2019-07-31T00:00:00+02:00'
        '204':
          description: No recent heartbeat data exist for the parameters supplied.
        '400':
          description: The input parameters are not valid.
        '401':
          description: The user is unauthorized for the project or the project doesn't exist.
        '404':
          description: Path identifier is unknown.
        '409':
          description: There is no monitoring database configured.

  /monitoring/useractivity:
    get:
      tags:
        - monitoring
      summary: Retrieve monitoring data about the most recent user activity.
      operationId: retrieve-monitoring-user-activity
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/testbench'
        - $ref: '#/components/parameters/machine'
      responses:
        '200':
          description: Recent user activity data was successfully retrieved.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/UserActivity'
              example:
                active: true
                lastEventDate: '2019-07-31T00:00:00+02:00'
                expiryDate: '2019-07-31T00:01:00+02:00'
                timestamp: '2019-07-31T00:00:00+02:00'
        '204':
          description: No recent user activity data exist for the parameters supplied.
        '400':
          description: The input parameters are not valid.
        '401':
          description: The user is unauthorized for the project or the project doesn't exist.
        '404':
          description: Path identifier is unknown.
        '409':
          description: There is no monitoring database configured.

  /monitoring/testexecution:
    get:
      tags:
        - monitoring
      summary: Retrieve monitoring data about the most recent automated test execution.
      operationId: retrieve-monitoring-test-execution
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/testbench'
        - $ref: '#/components/parameters/machine'
      responses:
        '200':
          description: Recent test execution data was successfully retrieved.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/TestExecution'
              example:
                projectLabel: 'HIL'
                testIdentifier: 'TestSequence001/TestCase001'
                actual: 1
                total: 3
                verdict: 'PASSED'
                status: 'RUNNING'
                automationTool: 'ECU-TEST'
                timestamp: '2019-07-31T00:01:00+02:00'
        '204':
          description: No recent test execution data exist for the parameters supplied.
        '400':
          description: The input parameters are not valid.
        '401':
          description: The user is unauthorized for the project or the project doesn't exist.
        '404':
          description: Path identifier is unknown.
        '409':
          description: There is no monitoring database configured.

