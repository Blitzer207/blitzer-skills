openapi: 3.0.2
info:
  title: test.guide User Management API
  description: API for accessing user management functionality of test.guide.
  contact:
    name: tracetronic support
    email: support@tracetronic.com
  license:
    name: tracetronic license
    url: https://www.tracetronic.com/software-license-terms/
  version: 1.7.0
servers:
  - url: /api/userManagement
    description: this test.guide server
  - url: /{context-path}/api/userManagement
    description: this test.guide server with a custom context path
    variables:
      context-path:
        default: test-guide
        description: context path to be used
  - url: '{url}/api/userManagement'
    description: custom test.guide server
    variables:
      url:
        default: https://localhost:8443
security:
  - TestGuideAuthKey: [ ]
  - BearerAuth: [ ]
paths:

  /whoami:
    get:
      tags:
        - user
      summary: Retrieve information about the current user.
      operationId: get-user
      responses:
        '200':
          description: The current user.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: No valid authentication was included in the request.
  
  /users:
    get:
      tags:
        - user
      summary: Retrieve information on all users.
      description: |
        This endpoint allows authorized users to retrieve a list of all users and their properties.

        To use this endpoint, both of the global permissions `SERVER_MANAGEMENT` and `USER_MANAGEMENT` are required.
      operationId: get-users
      responses:
        '200':
          description: The list of users.
          content:
            'application/json':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: No valid authentication was included in the request.
        '403':
          description: The user misses the necessary permissions.
  
  /users/{userId}/authkeys:
    post:
      tags:
        - user
      summary: Create a new authentication key
      description: |
        Creates a new authentication key for this user.

        A user can either create a new authentication key for themselves or, with the project permissions
        `PROJECT_MANAGEMENT` and `PROJECT_USER_MANAGEMENT` create a new authentication key for a TECHNICAL user.
      operationId: create-new-auth-key
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            example: 42
      requestBody:
        content:
          'application/json':
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "new key"
                expirationDate:
                  type: string
                  format: date-time
                  description: |
                    Date when the authentication key will become invalid; if not set the key will expire after one year.  
                    Date may not be more than 365 days in the future.
                automaticDelete:
                  type: boolean
                  description: |
                    If enabled, the authentication key will be deleted automatically shortly after it becomes invalid.
                  example: true
                  default: false
              required:
                - name
      responses:
        '201':
          description: New authentication key was created.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/AuthKey'

  /users/{userId}/projects:
    post:
      tags:
        - user
      summary: Activate user in a project
      description: |
        Activates an user in a project.

        Initially, the user has no project permissions. You can associate roles through the roles endpoint to grant additional permissions.
        Optionally, by using a flag, it is possible to grant project manager permissions to this user.

        To use this endpoint, the requesting user must have at least one of the following permission sets:
        - global permissions `SERVER_MANAGEMENT` and `USER_MANAGEMENT`
        - project permissions `PROJECT_MANAGEMENT` and `PROJECT_USER_MANAGEMENT`
      operationId: activate-in-project
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            example: 42
      requestBody:
        content:
          'application/json':
            schema:
              type: object
              properties:
                projectId:
                  type: integer
                  example: 123
                grantProjectManagementPermission:
                  type: boolean
                  description: If enabled, the user will be granted the individual permissions `PROJECT_MANAGEMENT` and `PROJECT_USER_MANAGEMENT`.
              required:
                - projectId
      responses:
        '204':
          description: 'User was activated in project'

  /users/{userId}/projects/{projectId}:
    delete:
      tags:
        - user
      summary: Remove user from a project
      description: |
        Removes an user from a project.

        To use this endpoint, the requesting user must have at least one of the following permission sets:
        - global permissions `SERVER_MANAGEMENT` and `USER_MANAGEMENT`
        - project permissions `PROJECT_MANAGEMENT` and `PROJECT_USER_MANAGEMENT`
      operationId: remove-from-project
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            example: 42
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
            example: 123
      responses:
        '204':
          description: 'User was removed from project'

  /projects/{projectId}/users:
    get:
      tags:
        - user
      summary: Retrieve all users in a project
      description: |
        This endpoint allows authorized users to retrieve a list of all users that are members of a given project.

        To use this endpoint, both of the project permissions `PROJECT_MANAGEMENT` and `PROJECT_USER_MANAGEMENT` are required.
      operationId: get-project-users
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
            example: 123
      responses:
        '200':
          description: The list of project users.
          content:
            'application/json':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectUser'
        '401':
          description: No valid authentication was included in the request.
        '403':
          description: The user misses the necessary permissions.

  /roles:
    get:
      tags:
        - user
      summary: Retrieve all project roles for a project
      operationId: get-project-roles
      parameters:
        - name: projectId
          description: The ID of the test.guide project
          in: query
          required: true
          schema:
            type: integer
            example: 23
      responses:
        '200':
          description: Project roles
          content:
            'application/json':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectRole'
    post:
      tags:
        - user
      summary: Create a new project role.
      description: |
        Create a new project role with its permission.
        
        To associate users and system groups with the project role, you need to use the respective endpoints.

        To use this endpoint, the permissions `PROJECT_MANAGEMENT` and `PROJECT_USER_MANAGEMENT` are required.
      operationId: create-project-role
      requestBody:
        description: Project role definition
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                projectId:
                  type: integer
                  example: 123
                name:
                  type: string
                  example: 'Reviewer'
                permissions:
                  type: array
                  items:
                    $ref: '#/components/schemas/ProjectPermission'
                  example: [TESTCASE_VIEWER, REVIEWER]
              required:
                - projectId
                - name
                - permissions
      responses:
        '201':
          description: Role ID
          content:
            'application/json':
              schema:
                type: integer
                format: int64
                example: 13

  /roles/{roleId}/users:
    post:
      tags:
        - user
      summary: Associate a user with the project role.
      description: |
        Associates the given user with the project role.
        
        The user must already exist.

        To use this endpoint, the permissions `PROJECT_MANAGEMENT` and `PROJECT_USER_MANAGEMENT` are required.
      operationId: associate-user-project-role
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Role ID of the role that should be associated with the user
      requestBody:
        description: Project role definition
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: integer
                  format: int64
                  example: 123
              required:
                - userId
      responses:
        '204':
          description: Successfully associated user with the project role

  /roles/{roleId}/groups:
    post:
      tags:
        - user
      summary: Associate a system group with the project role.
      description: |
        Associates the given system group with the project role.
        
        The association can be made whether or not the system group already exists.
        If the system group does not exist, you must create it for the association to take effect.

        To use this endpoint, the permissions `PROJECT_MANAGEMENT` and `PROJECT_USER_MANAGEMENT` are required.
      operationId: associate-group-project-role
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Role ID of the role that should be associated with the system group
      requestBody:
        description: System group name
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                groupName:
                  type: string
                  example: 'CN=Testmanagers,OU=Groups,DC=company'
              required:
                - groupName
      responses:
        '204':
          description: Successfully associated the system group with the project role

  /config/systemGroups/synchronization:
    get:
      tags:
        - user
      operationId: get-system-groups-synchronization
      summary: Get synchronization configuration for system groups
      description: |
        Allows to retrieve the current system group synchronization configuration.
        Only available for synchronization mechanism OpenID Connect.

        To use this endpoint, both of the global permissions `SERVER_MANAGEMENT` and `USER_MANAGEMENT` are required.
      responses:
        '200':
          description: |
            Current synchronization configuration, if one exists for synchronization mechanism OpenID Connect.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OidcSystemGroupSyncConfig'
        '204':
          description: |
            There is currently no system group synchronization configured or system group synchronization is configured with synchronization mechanism LDAP.
    post:
      tags:
        - user
      summary: Configure synchronization of system groups
      operationId: configure-system-groups-synchronization
      description: |
        Allows to set the system group synchronization configuration.
        Only available for synchronization mechanism OpenID Connect. Can only be used when OpenID Connect is used for authentication.

        To use this endpoint, both of the global permissions `SERVER_MANAGEMENT` and `USER_MANAGEMENT` are required.
      requestBody:
        description: New system group synchronization configuration for OpenID Connect to set.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OidcSystemGroupSyncConfig'
      responses:
        '200':
          description: Synchronization successfully changed

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: ID of the user
          example: 1
        userName:
          type: string
          description: User name
          example: 'JohnDoe'
        displayName:
          type: string
          description: Display name of the user
          example: 'John Doe'
        email:
          $ref: "#/components/schemas/Email"
        company:
          type: string
          description: Company of the user
          example: 'MyCompany'
        associatedProjects:
          type: array
          items:
            $ref: "#/components/schemas/UserProjectContext"
        systemGroups:
          type: array
          description: System groups, that this user is a member of
          items:
            type: string
          example:
            - 'system_group_name'
        globalPermissions:
          type: array
          items:
            $ref: "#/components/schemas/GlobalPermission"
          example:
            - SERVER_MANAGER
        userType:
          $ref: "#/components/schemas/UserType"
        confirmedDisclaimerVersion:
          type: integer
          description: The version of the disclaimer that the user has confirmed. If there is no disclaimer, the field is not returned.
          example: 3
        lastSeen:
          type: string
          description: An approximate indication of when the user last logged into web interface. Scaled in weeks, months etc. for privacy reasons.
          example: '2 weeks ago'

    UserProjectContext:
      type: object
      properties:
        projectId:
          type: integer
          description: ID of the project
          example: 1
        activationStatus:
          $ref: "#/components/schemas/UserActivationStatus"
        individualPermissions:
          type: array
          items:
            $ref: "#/components/schemas/ProjectPermission"
          example:
            - PROJECT_MANAGEMENT
            - TESTCASE_UPLOADER
            - UPLOAD_CLEANER
        projectRoles:
          type: array
          items:
            type: integer
            format: int64
          description: The IDs of the project roles of the user. Contains both the project roles where the user is a direct member as well as the project roles that the user inherited from a system group. Each project role can incorporate a set of permissions that the user inherits.
        individualProjectRoles:
          type: array
          items:
            type: integer
            format: int64
          description: The IDs of the project roles directly assigned to the user. Each project role can incorporate a set of permissions that the user inherits.
        systemGroupProjectRoles:
          type: array
          items:
            type: integer
            format: int64
          description: The IDs of the project roles that the user inherited from his member ship in a system group. Each project role can incorporate a set of permissions that the user inherits.
        effectivePermissions:
          type: array
          items:
            $ref: "#/components/schemas/ProjectPermission"
          description: The users set of permissions in context of the project, which is a combination of individual permissions and permissions inherited by project roles.
          example:
            - PROJECT_MANAGEMENT
            - TESTCASE_UPLOADER
            - UPLOAD_CLEANER

    ProjectPermission:
      type: string
      enum:
        - PROJECT_MANAGEMENT
        - UPLOAD_CLEANER
        - ARCHIVE_UPLOADER
        - TESTCASE_UPLOADER
        - REVIEWER
        - TESTCASE_VIEWER
        - HIL_USER
        - HIL_ADMIN
        - MONITORING_UPLOADER
        - ARCHIVE_DELETE
        - RELEASE_CREATE
        - RELEASE_READ
        - RELEASE_DELETE
        - MONITORING_DELETE
        - BUSINESSREPORT_MANAGEMENT
        - PROJECT_USER_MANAGEMENT
        - LOCK_RELEASE
        - UNLOCK_RELEASE
        - EXECUTION_CREATE
        - EXECUTION_READ
        - EXECUTION_DELETE
        - RA_CONFIG_SYNC
        - DASHBOARD_MANAGEMENT
        - SCM_CONFIG_MANAGEMENT
        - PROJECT_FILTER_MANAGEMENT
        - FLOW_TRIGGER_READ
        - FLOW_TRIGGER_CREATE
        - FLOW_TRIGGER_DELETE
        - FLOW_TASK_READ
        - FLOW_TASK_CREATE
        - FLOW_TASK_DELETE
        - FLOW_TASK_EXECUTE
        - QGATE_PLAN_CREATE
        - QGATE_PLAN_READ
        - QGATE_PLAN_DELETE
      description: Permission for a specific functionality in the project

    GlobalPermission:
      type: string
      enum:
        - SERVER_MANAGER
        - USER_MANAGEMENT
        - METRICS_ACCESS
      description: Global permission

    UserActivationStatus:
      type: string
      enum:
        - ACTIVATED
        - IN_PROGRESS
        - DEACTIVATED
      description: |
        Activation status of the user in the project.
        * `ACTIVATED` - The user is an active user of the project, able to interact.
        * `IN_PROGRESS` - The user has requested to become an active user of the project, but this request was not accepted yet.
        * `DEACTIVATED` - The user is not an active user of the project and may not interact in it.
    
    ProjectUser:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: ID of the user
          example: 1
        userName:
          type: string
          description: User name
          example: 'JohnDoe'
        displayName:
          type: string
          description: Display name of the user
          example: 'John Doe'
        email:
          $ref: "#/components/schemas/Email"
        company:
          type: string
          description: Company of the user
          example: 'MyCompany'
        projectContext:
          $ref: "#/components/schemas/UserProjectContext"
        systemGroups:
          type: array
          description: System groups, that this user is a member of
          items:
            type: string
          example:
            - 'system_group_name'
        userType:
          $ref: "#/components/schemas/UserType"

    Email:
      type: string
      pattern: '^[!_A-Za-z0-9-]+(\.[!_A-Za-z0-9-]+)*@[A-Za-z0-9-]+(\.[A-Za-z0-9-]+)*((\.[A-Za-z]{2,}){1}$)'
      description: Email address of the user
      example: 'john.doe@mycompany.de'

    UserType:
      type: string
      enum:
        - REGULAR
        - TECHNICAL
      description: |
        * `REGULAR` - The user is a regular user, able to log in to the web interface.
        * `TECHNICAL` - The user is technical user, able to interact with the API only.

    ProjectRole:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 4
        name:
          type: string
          example: Test Manager

    OidcSystemGroupSyncConfig:
      type: object
      description: System group configuration with mechanism  OpenID Connect.
      properties:
        accessTokenSearchPaths:
          type: array
          description: JsonPath expressions for selecting the system groups from the access token.
          example:
            - "$..['roles'][*]"
          items:
            type: string
        userInfoSearchPaths:
          type: array
          description: JsonPath expressions for selecting the system groups from the user info response.
          example:
            - "$..['roles'][*]"
          items:
            type: string

    AuthKey:
      type: object
      properties:
        authKey:
          type: string
          format: password
          example: 1aBCD23=.EFGH456iJk...

  securitySchemes:
    TestGuideAuthKey:
      type: apiKey
      name: 'TestGuide-AuthKey'
      in: header

    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
