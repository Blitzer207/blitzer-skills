openapi: 3.0.2
info:
  title: test.guide Execution API
  description: API for accessing execution functionality of test.guide.
  contact:
    name: tracetronic support
    email: support@tracetronic.com
  license:
    name: tracetronic license
    url: https://www.tracetronic.com/software-license-terms/
  version: 2.61.0
servers:
  - url: /api/v2/execution
    description: this test.guide server
  - url: /{context-path}/api/v2/execution
    description: this test.guide server with a custom context path
    variables:
      context-path:
        default: test-guide
        description: context path to be used
  - url: '{url}/api/v2/execution'
    description: custom test.guide server
    variables:
      url:
        default: https://localhost:8443
security:
  - TestGuideAuthKey: [ ]
  - BearerAuth: [ ]
paths:

  /task:
    post:
      tags:
        - execution tasks
      summary: Create an execution task. If a start date or a cronExpression is given a job is created.
      description: |
        - If no "startDate" and no "cronExpression" are given, then a normal execution task will be created and the task ID will be returned.
        - If a "startDate" but no "cronExpression" is given, then a job for creating an execution task in the future will be created and its job ID will be returned.
        - If a "startDate" and a "cronExpression" are given, then a job for a repetitive execution task will be created and its job ID will be returned.
        - If no "startDate" but a "cronExpression" is given, then a job for a repetitive execution task with direct first execution will be created and its job ID will be returned.
        - Additionally if a repetitive execution task is created (by specifying the "cronExpression" parameter), the "checkLastExecution" parameter can be set to true.
        In this case the job will only create a new execution task if the last execution task created by this job has already finished its execution.
      operationId: post-bundle
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/cronExpression'
        - $ref: '#/components/parameters/cronTimeZone'
        - $ref: '#/components/parameters/checkLastExecution'
      requestBody:
        description: Bundle description for the execution task.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutionTask'
      responses:
        '200':
          description: |
            Execution task successfully created.
            If no cronExpression or start date has been given, the ID of the newly created task is returned.
            Otherwise the ID of the generated job is returned.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/CreateTaskResponse'
        '400':
          description: The bundle provided invalid.
        default:
          $ref: '#/components/responses/GeneralError'

    get:
      tags:
        - execution tasks
      summary: Get all execution tasks of a project.
      operationId: get-tasks
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/taskFields'
        - $ref: '#/components/parameters/sortExecutionTask'
        - $ref: '#/components/parameters/ascending'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: List of all tasks in the given project.
          content:
            'application/json':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExecutionTask'
        default:
          $ref: '#/components/responses/GeneralError'

  /task/filter:
    post:
      tags:
        - execution tasks
      summary: Search for execution tasks using a filter.
      operationId: filter-tasks
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/taskFields'
        - $ref: '#/components/parameters/sortExecutionTask'
        - $ref: '#/components/parameters/ascending'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/limit'
      requestBody:
        description: Execution task filter.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutionTaskFilter'
      responses:
        '200':
          description: Return the matching execution tasks.
          content:
            'application/json':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExecutionTask'
        default:
          $ref: '#/components/responses/GeneralError'

  /task/{taskId}:
    get:
      tags:
        - execution tasks
      summary: Get an execution task.
      operationId: get-task
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/taskId'
        - $ref: '#/components/parameters/taskFields'
      responses:
        '200':
          description: The requested execution task.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/ExecutionTask'
        '404':
          description: The taskId is not found or invalid.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
        default:
          $ref: '#/components/responses/GeneralError'

    delete:
      tags:
        - execution tasks
      summary: Delete an execution task.
      operationId: delete-task
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/taskId'
      responses:
        '204':
          description: The execution task was successfully deleted.
        '404':
          description: The taskId is not found or invalid.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
        default:
          $ref: '#/components/responses/GeneralError'

    patch:
      tags:
        - execution tasks
      summary: Update an existing execution task. Partial task objects can be passed and only the included fields are updated.
      operationId: update-task
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/taskId'
      requestBody:
        description: Bundle description for the execution task.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutionTaskPatch'
      responses:
        '204':
          description: Successfully updated the execution task.
        '400':
          description: The provided property of the task cannot be updated.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: The taskId is not found or invalid.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: The task can not be updated anymore because it is running or finished.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
        default:
          $ref: '#/components/responses/GeneralError'

  /task/{taskId}/abort:
    put:
      tags:
        - execution tasks
      summary: |
        Aborts the execution task.
      description: |
        Aborts the execution task.
        If the task is currently running, an abort request is saved and the executing resource adapter may eventually abort the task.
        If the task is currently in one of the states WAITING or BLOCKED, the tasks state will be set to ERROR and the task will be annotated with an errorMessage.
        Aborting a task in other states than RUNNING, WAITING or BLOCKED is not allowed and will produce an error response.
      operationId: abortTask
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/taskId'
      requestBody:
        description: Type of abort.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AbortRequest'
      responses:
        '202':
          description: The abort was successfully requested. The task is still running and will be aborted eventually.
        '204':
          description: Successfully updated the execution task.
        '400':
          description: The state of the task does not allow to be aborted or the execution task was already aborted.
        '404':
          description: The task ID is not found or invalid.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
        default:
          $ref: '#/components/responses/GeneralError'

  /playbook:
    post:
      tags:
        - playbooks
      summary: Upload a new playbook.
      description: |
        Creates a new playbook with a name and a revision as unique key.
        The name is taken from the playbook.
        The revision is an upcounting number in association with the playbooks name.
        Created playbooks are immutable.
        Additionally each playbook has a unique ID.

        Playbooks that make use of ecu.test steps require ecu.test 2020.4 or newer for their execution.
      operationId: post-playbook
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/playbookFolder'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Playbook'
      responses:
        '200':
          description: Playbook was successfully stored. Returns the id of the stored playbook.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/PlaybookResponse'
        '400':
          description: The provided playbook is invalid.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
        default:
          $ref: '#/components/responses/GeneralError'

    get:
      tags:
        - playbooks
      summary: Get all playbooks of a project.
      operationId: get-playbooks
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/playbookName'
        - $ref: '#/components/parameters/playbookRevision'
        - $ref: '#/components/parameters/sortPlaybook'
        - $ref: '#/components/parameters/ascending'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: List of all playbooks in the given project.
          content:
            'application/json':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Playbook'
        default:
          $ref: '#/components/responses/GeneralError'

    delete:
      tags:
        - playbooks
      summary: Delete all revisions of a playbook by its name.
      operationId: delete-playbook
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/requiredPlaybookName'
        - $ref: '#/components/parameters/playbookFolder'
      responses:
        '204':
          description: The playbook was successfully deleted.
        '404':
          description: The playbook name is not found.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
        default:
          $ref: '#/components/responses/GeneralError'

  /playbook/filter:
    post:
      tags:
        - playbooks
      summary: Search for playbooks using a filter.
      operationId: filter-playbooks
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/sortPlaybook'
        - $ref: '#/components/parameters/ascending'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/limit'
      requestBody:
        description: Playbook filter.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaybookFilter'
      responses:
        '200':
          description: Return the matching playbooks.
          content:
            'application/json':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Playbook'
        default:
          $ref: '#/components/responses/GeneralError'

  /playbook/latest:
    get:
      tags:
        - playbooks
      summary: Get all playbooks with latest revision of a project.
      operationId: get-playbooks-latest
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/playbookNameWithWildcards'
        - $ref: '#/components/parameters/sortPlaybook'
        - $ref: '#/components/parameters/ascending'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: List of all playbooks with latest revision in the given project.
          content:
            'application/json':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Playbook'
        default:
          $ref: '#/components/responses/GeneralError'

  /playbook/{playbookId}:
    get:
      tags:
        - playbooks
      summary: Get a playbook.
      operationId: get-playbook
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/playbookId'
      responses:
        '200':
          description: List of all playbooks in the given project.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Playbook'
        '404':
          description: The playbookId is not found or invalid.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
        default:
          $ref: '#/components/responses/GeneralError'

  /playbook/{playbookId}/move:
    put:
      tags:
        - playbooks
      summary: Moves a playbook to another folder.
      description: |
        Although only one playbook ID is specified the whole playbook history (i.e. all revisions of this playbook) will 
        be moved to the specified folder.
      operationId: move-playbook
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/playbookId'
      requestBody:
        description: The target folder to move the playbook to.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaybookMoveRequest'
      responses:
        '204':
          description: |
            The playbook was moved to the specified folder successfully.
        '404':
          description: |
            The specified folder does not exist in this project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: |
            A playbook with the name of the playbook to move already exists in the target folder.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          $ref: '#/components/responses/GeneralError'

  /playbook/{playbookId}/execute:
    post:
      tags:
        - playbooks
      summary: Execute a playbook. This will create execution tasks or a project job.
      description: |
        - If no "startDate" and no "cronExpression" are given, then execution tasks are created from the playbook.
        - If a "startDate" but no "cronExpression" is given, then a job for creating execution tasks in the future will be 
        created and its job ID will be returned.
        - If a "startDate" and a "cronExpression" are given, then a job for a repetitive playbook execution will be created 
        and its job ID will be returned.
        - If no "startDate" but a "cronExpression" is given, then a job for a repetitive playbook execution with direct first 
        execution will be created and its job ID will be returned.
        - Additionally if a repetitive execution task is created (by specifying the "cronExpression" parameter), the 
        "checkLastExecution" parameter can be set to true.
        In this case the job will only create new execution tasks if the last execution tasks created by this job are 
        already terminated.
        
        (Attention: The generated job will always execute the latest persisted version of the corresponding 
        playbook. This may not match the specified playbookId.)
      operationId: execute-playbook
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/playbookId'
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/cronExpression'
        - $ref: '#/components/parameters/cronTimeZone'
        - $ref: '#/components/parameters/checkLastExecution'
      requestBody:
        description: Description for the playbook.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaybookExecutionRequest'
      responses:
        '200':
          description: |
            Execution tasks successfully created.
            If no cronExpression or start date has been given, the IDs of the newly created tasks are returned.
            Otherwise the ID of the generated job is returned.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/ExecutePlaybookResponse'
        '404':
          description: The playbook ID is not found or invalid.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
        default:
          $ref: '#/components/responses/GeneralError'

  /playbook/folder:
    get:
      tags:
        - playbook folders
      operationId: get-folders
      summary: Return all playbook folders of the project.
      description: |
        Returns all playbook folders of the specified project. 
        If the parameter parentId is passed, only the direct children of this folder will be returned.
        The root folder has ID 0.
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/playbookFolderParentId'
        - $ref: '#/components/parameters/sortPlaybookFolder'
        - $ref: '#/components/parameters/ascending'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Successfully fetched all playbook folders.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlaybookFolderInfo'
        default:
          $ref: '#/components/responses/GeneralError'

    post:
      tags:
        - playbook folders
      operationId: create-folder
      summary: Create a new playbook folder.
      description: |
        Creates a new playbook folder inside the specified parent.
        The name of the folder must be unique among the children with the same parent.
      parameters:
        - $ref: '#/components/parameters/projectId'
      requestBody:
        description: The name and the parent of the new playbook folder.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaybookFolder'
      responses:
        '200':
          description: The ID of the created playbook folder.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaybookFolderPostResponse'
        '404':
          description: The parent playbook folder does not exist.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: A folder with this name already exists in the parent folder.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          $ref: '#/components/responses/GeneralError'

  /playbook/folder/{folderId}:
    get:
      tags:
        - playbook folders
      operationId: get-folder
      summary: Return a playbook folder.
      description: |
        Returns the playbook folder with the specified ID.
        Use /playbook/folder?parentId={folderId} to fetch the direct children of this folder.
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/playbookFolderId'
      responses:
        '200':
          description: Returns the playbook folder information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaybookFolderInfo'
        default:
          $ref: '#/components/responses/GeneralError'

    put:
      tags:
        - playbook folders
      operationId: update-folder
      summary: Update a playbook folder.
      description: |
        Renames and/or moves the playbook folder.
        The name of the folder must be unique among the children with the same parent.
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/playbookFolderId'
      requestBody:
        description: The new values for the name and the parent ID of the playbook folder to be updated.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaybookFolder'
      responses:
        '204':
          description: The playbook folder was successfully updated
        '400':
          description: The request is invalid. The root folder (ID 0) for example cannot be updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: In the specified new parent folder already exists a playbook folder with the specified name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          $ref: '#/components/responses/GeneralError'

    delete:
      tags:
        - playbook folders
      operationId: delete-folder
      summary: Delete a playbook folder.
      description: |
        Deletes a playbook folder recursively.
        
        **Attention:** this will also remove all playbooks associated with any of the playbook folders to be removed.
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/playbookFolderId'
      responses:
        '204':
          description: The playbook folder was successfully deleted.
        default:
          $ref: '#/components/responses/GeneralError'

  /variable:
    post:
      tags:
        - variables
      summary: Create a new public variable for test execution.
      operationId: post-variable
      parameters:
        - $ref: '#/components/parameters/projectId'
      requestBody:
        description: Definition of the public variable.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicVariable'
      responses:
        '204':
          description: The public variable was successfully created.
        '409':
          description: A public variable with the given label already exists.
        default:
          $ref: '#/components/responses/GeneralError'

    get:
      tags:
        - variables
      summary: Get all public variables of the execution context of a project.
      operationId: get-variables
      parameters:
        - $ref: '#/components/parameters/projectId'
      responses:
        '200':
          description: List of all public variables in the given project.
          content:
            'application/json':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicVariable'
        default:
          $ref: '#/components/responses/GeneralError'

  /variable/{label}:
    get:
      tags:
        - variables
      summary: Get the public variable of the execution context with the given label.
      operationId: get-variable
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/variableLabel'
      responses:
        '200':
          description: Public variable with the given label.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/PublicVariable'
        '404':
          description: A public variable with the given label does not exist.
        default:
          $ref: '#/components/responses/GeneralError'

    put:
      tags:
        - variables
      summary: Update the public variable of the execution context with the given label.
      description: |
        The label itself can also be changed.
        To do this, please specify the old label as the query parameter and the new label in the JSON body.
      operationId: update-variable
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/variableLabel'
      requestBody:
        description: Description for the public variable.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicVariable'
      responses:
        '204':
          description: The public variable was successfully updated.
        '404':
          description: A public variable with the given old label does not exist.
        '409':
          description: A public variable with the given new label already exists.
        default:
          $ref: '#/components/responses/GeneralError'

    delete:
      tags:
        - variables
      summary: Delete the public variable of the execution context with the given label.
      operationId: delete-variable
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/variableLabel'
      responses:
        '204':
          description: The public variable was successfully deleted.
        '404':
          description: A public variable with the given label does not exist.
        default:
          $ref: '#/components/responses/GeneralError'

  /secret:
    post:
      tags:
        - variables
      summary: Create a new secret variable for test execution.
      operationId: post-secret-variable
      parameters:
        - $ref: '#/components/parameters/projectId'
      requestBody:
        description: Definition of the secret variable.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecretVariable'
      responses:
        '204':
          description: The secret variable was successfully created.
        '409':
          description: A secret variable with the given label already exists.
        default:
          $ref: '#/components/responses/GeneralError'

    get:
      tags:
        - variables
      summary: Get all secret variables of the execution context of a project.
      operationId: get-secret-variables
      parameters:
        - $ref: '#/components/parameters/projectId'
      responses:
        '200':
          description: List of all secret variables in the given project.
          content:
            'application/json':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SecretVariableInfo'
        default:
          $ref: '#/components/responses/GeneralError'

  /secret/{label}:
    get:
      tags:
        - variables
      summary: Get the secret variable of the execution context with the given label.
      operationId: get-secret-variable
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/variableLabel'
      responses:
        '200':
          description: Secret variable with the given label.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/SecretVariableInfo'
        '404':
          description: A secret variable with the given label does not exist.
        default:
          $ref: '#/components/responses/GeneralError'

    put:
      tags:
        - variables
      summary: Update the secret variable of the execution context with the given label.
      description: |
        The label itself can also be changed.
        To do this, please specify the old label as the query parameter and the new label in the JSON body.
      operationId: update-secret-variable
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/variableLabel'
      requestBody:
        description: Description for the secret variable.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecretVariable'
      responses:
        '204':
          description: The secret variable was successfully updated.
        '404':
          description: A secret variable with the given old label does not exist.
        '409':
          description: A secret variable with the given new label already exists.
        default:
          $ref: '#/components/responses/GeneralError'

    delete:
      tags:
        - variables
      summary: Delete the secret variable of the execution context with the given label.
      operationId: delete-secret-variable
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/variableLabel'
      responses:
